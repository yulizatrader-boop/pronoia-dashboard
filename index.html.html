<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRONOIA TRADERS - Acceso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #060709;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .header-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-box h2 {
            color: #00f0ff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header-box p {
            color: #8492a6;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #e5e7eb;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }

        .form-group input::placeholder {
            color: #484f58;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #00f0ff;
            color: #060709;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #00c8d6;
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: #484f58;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header-box">
            <h2>PRONOIA TRADERS</h2>
            <p>Ecosistema Algorítmico EdgeCore Analyzer</p>
        </div>

        <!-- 
          IMPORTANTE: Reemplaza el enlace de abajo por tu enlace de Formspree 
          para que los correos te lleguen a ti y a tu cliente.
        -->
        <form action="https://formspree.io/f/maqzkpjeSO" method="POST">
            
            <div class="form-group">
                <label for="username">Usuario Institucional</label>
                <input type="text" name="username" id="username" placeholder="Tu ID de usuario" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" name="email" id="email" placeholder="tu-correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña de Seguridad</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Registrarme y Recibir Datos</button>
        </form>

        <div class="footer-note">
            Al registrarte, recibirás un correo de verificación con tus credenciales guardadas para soporte y recuperación de cuenta.
        </div>
    </div>

</body>
</html>
